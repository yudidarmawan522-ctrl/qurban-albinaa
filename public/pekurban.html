<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pekurban | Al Binaa Qurban</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <link rel="icon" type="image/png" href="img/logo_v2.png">
</head>
<body style="background: #f0f2f5;">
    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand" style="display: flex; align-items: center; gap: 0.8rem; padding: 2rem 1.5rem;">
                <img src="img/logo_v2.png" alt="Logo" style="height: 35px; width: 35px; background: white; border-radius: 50%; padding: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <span style="font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px;">AL BINAA ADMIN</span>
            </div>
            <ul class="sidebar-nav">
                <li><a href="admin.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
                <li><a href="inventaris.html"><i class="fas fa-box"></i> <span>Inventaris</span></a></li>
                <li><a href="pekurban.html" class="active"><i class="fas fa-users"></i> <span>Data Pekurban</span></a></li>
                <li><a href="laporan.html" style="color: #4db6ac;"><i class="fas fa-file-contract"></i> <span>Rekap Laporan</span></a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> <span>Pengaturan</span></a></li>
                <li style="margin-top: 2rem;"><a href="index.html" style="color: #ffab91;"><i class="fas fa-external-link-alt"></i> <span>View Public Site</span></a></li>
            </ul>
        </aside>

        <div class="mobile-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></div>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; background: white; padding: 1.5rem 2rem; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
                <div>
                    <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--primary);">Data Mudhohi & Santri</h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Manajemen lengkap data pendaftaran qurban</p>
                </div>
                <div style="display: flex; gap: 2rem; align-items: center;">
                    <div id="realtime-clock" style="text-align: right; border-right: 2px solid #f0f0f0; padding-right: 2rem;">
                        <div id="clock-time" style="font-size: 1.6rem; font-weight: 800; color: var(--primary); line-height: 1;">00:00:00</div>
                        <div id="clock-date" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-top: 5px;">Hari, Tanggal</div>
                    </div>
                </div>
            </header>

            <div class="table-card">
                <div class="table-header">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Cari Nama Mudhohi, Santri, atau Kelas...">
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn-export" id="btn-export-excel" style="background: #2e7d32; border: none; padding: 0.6rem 1rem; border-radius: 8px; color: white; cursor: pointer; font-weight: 700;"><i class="fas fa-file-excel"></i> Export Excel</button>
                        <button class="btn-export" id="btn-export-pdf" style="background: #c62828; border: none; padding: 0.6rem 1rem; border-radius: 8px; color: white; cursor: pointer; font-weight: 700;"><i class="fas fa-file-pdf"></i> Download PDF</button>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table id="full-table">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Mudhohi</th>
                                <th>Santri</th>
                                <th>Kelas</th>
                                <th>Jenis Qurban</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="registrations-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="modal-edit" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close-modal">&times;</span>
            <h2 style="color: var(--primary); margin-bottom: 1.5rem;"><i class="fas fa-user-edit"></i> Edit Data Pendaftaran</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Nama Mudhohi</label>
                        <input type="text" id="edit-name" required>
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel" id="edit-phone" required>
                    </div>
                    <div class="form-group">
                        <label>Nama Santri</label>
                        <input type="text" id="edit-santri" required>
                    </div>
                    <div class="form-group">
                        <label>Kelas Santri</label>
                        <input type="text" id="edit-class" required>
                    </div>
                </div>
                <div class="grid-2" style="margin-top: 1rem;">
                    <div class="form-group">
                        <label>Tipe Hewan</label>
                        <select id="edit-type" required></select>
                    </div>
                    <div class="form-group">
                        <label>Opsi Pembelian</label>
                        <select id="edit-purchase" required>
                            <option value="Utuh">Beli Utuh</option>
                            <option value="Patungan">Patungan (1/7)</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2" style="margin-top: 1rem;">
                    <div class="form-group">
                        <label>Metode Pembayaran</label>
                        <select id="edit-payment" required>
                            <option value="Transfer BSI">Transfer BSI</option>
                            <option value="Cash">Tunai</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="edit-status" required>
                            <option value="Pending">Pending</option>
                            <option value="Confirmed">Confirmed (Lunas)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 2rem; padding: 1rem;">
                    <i class="fas fa-save"></i> SIMPAN PERUBAHAN
                </button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('registrations-body');
            const searchInput = document.getElementById('search-input');
            const editModal = document.getElementById('modal-edit');
            const editForm = document.getElementById('edit-form');
            const editTypeSelect = document.getElementById('edit-type');
            
            let allData = [];
            let cachedTypes = [];

            const loadData = async () => {
                const [regs, types] = await Promise.all([
                    fetchAPI('/registrations'),
                    fetchAPI('/types')
                ]);
                allData = regs;
                cachedTypes = types;
                
                // Populate types in select
                editTypeSelect.innerHTML = '';
                cachedTypes.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    opt.textContent = `${t.category} - ${t.type} (${t.weight})`;
                    editTypeSelect.appendChild(opt);
                });

                renderTable(allData);
            };

            const renderTable = (data) => {
                tableBody.innerHTML = '';
                data.forEach(reg => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${new Date(reg.created_at).toLocaleDateString('id-ID')}</td>
                        <td><strong>${reg.name}</strong></td>
                        <td>${reg.santri_name}</td>
                        <td>${reg.santri_class}</td>
                        <td>${reg.category} - ${reg.type_label}</td>
                        <td><span class="badge ${reg.status === 'Pending' ? 'badge-pending' : 'badge-confirmed'}">${reg.status}</span></td>
                        <td>
                            <button title="Ubah Status" onclick="toggleStatus('${reg.id}', '${reg.status}')" style="border:none; background:${reg.status === 'Confirmed' ? '#e8f5e9' : '#fff3e0'}; color:${reg.status === 'Confirmed' ? '#2e7d32' : '#ef6c00'}; padding:0.5rem; border-radius:5px; cursor:pointer;"><i class="fas fa-${reg.status === 'Confirmed' ? 'check-circle' : 'clock'}"></i></button>
                            <button title="Kwitansi Digital" onclick="handleReceiptDownload('${reg.id}')" style="border:none; background:#004d40; color:white; padding:0.5rem; border-radius:5px; cursor:pointer; margin-left:0.3rem;"><i class="fas fa-file-pdf"></i></button>
                            <button title="Edit Lengkap" onclick="openEditModal('${reg.id}')" style="border:none; background:#e3f2fd; color:#1565c0; padding:0.5rem; border-radius:5px; cursor:pointer; margin-left:0.3rem;"><i class="fas fa-edit"></i></button>
                            <button title="Hapus Data" onclick="deleteData('${reg.id}')" style="border:none; background:#ffebee; color:#c62828; padding:0.5rem; border-radius:5px; cursor:pointer; margin-left:0.3rem;"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            };

            window.handleReceiptDownload = (id) => {
                const reg = allData.find(r => r.id == id);
                if (reg) window.downloadReceipt(reg);
            };

            window.openEditModal = (id) => {
                const reg = allData.find(r => r.id == id);
                if (!reg) return;

                document.getElementById('edit-id').value = reg.id;
                document.getElementById('edit-name').value = reg.name;
                document.getElementById('edit-phone').value = reg.phone;
                document.getElementById('edit-santri').value = reg.santri_name;
                document.getElementById('edit-class').value = reg.santri_class;
                document.getElementById('edit-type').value = reg.type_id;
                document.getElementById('edit-purchase').value = reg.purchase_type;
                document.getElementById('edit-payment').value = reg.payment_method;
                document.getElementById('edit-status').value = reg.status;

                editModal.style.display = 'block';
            };

            editForm.onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-id').value;
                const updateData = {
                    name: document.getElementById('edit-name').value,
                    phone: document.getElementById('edit-phone').value,
                    santri_name: document.getElementById('edit-santri').value,
                    santri_class: document.getElementById('edit-class').value,
                    type_id: document.getElementById('edit-type').value,
                    purchase_type: document.getElementById('edit-purchase').value,
                    payment_method: document.getElementById('edit-payment').value,
                    status: document.getElementById('edit-status').value
                };

                const res = await fetchAPI(`/registrations/${id}`, 'PUT', updateData);
                if (!res.error) {
                    alert('Data berhasil diperbarui!');
                    editModal.style.display = 'none';
                    loadData();
                } else {
                    alert('Gagal memperbarui data.');
                }
            };

            window.deleteData = async (id) => {
                if (confirm('Yakin ingin menghapus data ini secara permanen?')) {
                    const res = await fetchAPI(`/registrations/${id}`, 'DELETE');
                    if (!res.error) loadData();
                    else alert('Gagal menghapus data.');
                }
            };

            window.toggleStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'Pending' ? 'Confirmed' : 'Pending';
                const res = await fetchAPI(`/registrations/${id}`, 'PUT', { status: newStatus });
                if (!res.error) loadData();
            };

            document.querySelector('.close-modal').onclick = () => editModal.style.display = 'none';
            window.onclick = (e) => { if (e.target == editModal) editModal.style.display = 'none'; };

            searchInput.oninput = () => {
                const query = searchInput.value.toLowerCase();
                const filtered = allData.filter(reg => 
                    reg.name.toLowerCase().includes(query) || 
                    reg.santri_name.toLowerCase().includes(query) ||
                    reg.santri_class.toLowerCase().includes(query)
                );
                renderTable(filtered);
            };

            loadData();
        });
    </script>
</body>
</html>
