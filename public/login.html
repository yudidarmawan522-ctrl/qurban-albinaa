<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Al Binaa Qurban</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/logo.png">
    <style>
        body {
            background: linear-gradient(135deg, #004d40 0%, #002d24 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .login-input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--secondary);
            color: var(--primary);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="img/logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <h2 style="color: white; margin-bottom: 0.5rem; font-weight: 800;">ADMIN LOGIN</h2>
        <p style="color: rgba(255,255,255,0.6); margin-bottom: 2rem;">Silakan masuk untuk akses dashboard</p>
        
        <form id="login-form">
            <div style="position: relative; margin-bottom: 1rem;">
                <input type="text" id="username" class="login-input" style="margin-bottom: 0;" placeholder="Username" required>
            </div>
            <div style="position: relative; margin-bottom: 1.5rem;">
                <input type="password" id="password" class="login-input" style="margin-bottom: 0; padding-right: 3rem;" placeholder="Password" required>
                <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--primary); cursor: pointer; font-size: 1.2rem;"></i>
            </div>
            <button type="submit" class="btn-login" style="margin-bottom: 1rem;">MASUK SEKARANG <i class="fas fa-sign-in-alt"></i></button>
            <a href="#" id="forgot-password" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; font-weight: 600;">Lupa Password?</a>
        </form>
    </div>

    <script>
        // Toggle Password Visibility
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.querySelector('.btn-login');
            
            btn.innerHTML = 'MEMPROSES... <i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userRole', result.user.role);
                    window.location.href = 'admin.html';
                } else {
                    alert(result.message || 'Username atau Password salah!');
                    btn.innerHTML = 'MASUK SEKARANG <i class="fas fa-sign-in-alt"></i>';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error during login:', error);
                const errorMsg = error.message.includes('Unexpected token') 
                    ? 'Konflik Port Terdeteksi! Server mengembalikan data yang salah. Saya telah memindahkan port ke 4000. Silakan akses http://localhost:4000/login.html'
                    : 'Terjadi kesalahan pada server. Pastikan database MySQL berjalan.';
                alert(errorMsg);
                btn.innerHTML = 'MASUK SEKARANG <i class="fas fa-sign-in-alt"></i>';
                btn.disabled = false;
            }
        };

        document.getElementById('forgot-password').onclick = (e) => {
            e.preventDefault();
            const email = prompt("Masukkan Email Administrator Anda:");
            if (email) {
                alert("Instruksi reset password telah dikirim ke email " + email + " (Simulasi)");
            }
        };
    </script>
</body>
</html>
