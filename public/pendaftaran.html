<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Qurban 1447H | Al Binaa</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/logo_v2.png">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f0f4f3; }
        .form-header {
            background: linear-gradient(135deg, var(--primary) 0%, #002d24 100%);
            padding: 2rem 1.5rem 3.5rem;
            text-align: center;
            color: white;
            clip-path: ellipse(150% 100% at 50% 0%);
            position: relative;
        }
        .main-form-container {
            max-width: 900px;
            margin: -2.5rem auto 5rem;
            padding: 0 1.5rem;
        }
        .premium-card {
            background: white;
            padding: 2.5rem;
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border: 1px solid white;
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 1rem;
        }
        .section-title i { color: var(--secondary); }
        .btn-back {
            position: absolute;
            left: 2rem;
            top: 2rem;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.8;
            transition: 0.3s;
        }
        .btn-back:hover { opacity: 1; transform: translateX(-5px); }
    </style>
</head>
<body>
    <div class="form-header">
        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> KEMBALI
        </a>
        <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.3rem;">Formulir Pendaftaran</h1>
        <p style="opacity: 0.8; font-size: 0.95rem;">Sempurnakan Ibadah Qurban Ananda & Keluarga</p>
    </div>

    <div class="main-form-container">
        <div class="premium-card">
            <form id="qurban-form" enctype="multipart/form-data">
                <!-- Section: Identitas -->
                <div class="form-section">
                    <h2 class="section-title"><i class="fas fa-user-circle"></i> Identitas Mudhohi</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nama Lengkap Mudhohi</label>
                            <input type="text" id="name" required placeholder="Nama Lengkap">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-whatsapp"></i> WhatsApp Aktif</label>
                            <input type="tel" id="phone" required placeholder="0812xxxx">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-user-graduate"></i> Nama Santri</label>
                            <input type="text" id="santri_name" required placeholder="Nama Santri">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-school"></i> Kelas</label>
                            <input type="text" id="santri_class" required placeholder="Contoh: 7A">
                        </div>
                    </div>
                </div>

                <!-- Section: Pilih Hewan -->
                <div class="form-section" style="margin-top: 2.5rem;">
                    <h2 class="section-title"><i class="fas fa-cow"></i> Pilih Hewan Qurban</h2>
                    <div class="animal-selection" id="animal-types-container">
                        <!-- Cards injected via JS -->
                        <div class="loading">Memuat pilihan hewan...</div>
                    </div>
                    <input type="hidden" id="selected-type-id" required>
                </div>

                <!-- Section: Opsi & Pembayaran -->
                <div class="form-section" style="margin-top: 2.5rem;">
                    <h2 class="section-title"><i class="fas fa-credit-card"></i> Opsi & Pembayaran</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Opsi Pembelian</label>
                            <select id="purchase_type" required>
                                <option value="Utuh">Beli Utuh (1 Ekor)</option>
                                <option value="Patungan">Patungan (1/7 Bagian Sapi)</option>
                            </select>
                        </div>
                        <div id="animal-no-container" class="form-group" style="display:none;">
                            <label>Kelompok Sapi Ke-</label>
                            <select id="animal_no">
                                <option value="1">Sapi 1</option>
                                <option value="2">Sapi 2</option>
                                <option value="3">Sapi 3</option>
                                <option value="4">Sapi 4</option>
                                <option value="5">Sapi 5</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Metode Pembayaran</label>
                            <select id="payment_method" required>
                                <option value="Transfer BSI">Transfer Bank BSI</option>
                                <option value="Cash">Tunai ke Panitia</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Penyembelihan</label>
                            <select id="penyembelih" required>
                                <option value="Panitia">Panitia Al Binaa</option>
                                <option value="Orang Tua">Orang Tua Sendiri</option>
                                <option value="Ananda">Ananda (Santri)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Bukti Transfer -->
                <div class="form-group" style="margin-top: 2rem; background: #fff8e1; padding: 2rem; border-radius: 20px; border: 2px dashed #ffa000; text-align: center;">
                    <label style="justify-content: center; color: #e65100;"><i class="fas fa-upload"></i> Upload Bukti Pembayaran</label>
                    <input type="file" id="proof_image" accept="image/*" style="margin-top: 1rem; background: white;">
                    <small style="display: block; margin-top: 0.5rem; color: #666;">Maksimal 5MB (JPG/PNG)</small>
                </div>

                <div class="form-group" style="margin-top: 2rem;">
                    <label>Catatan Khusus</label>
                    <textarea id="notes" rows="3" placeholder="Contoh: Atas nama keluarga besar..."></textarea>
                </div>

                <!-- Summary -->
                <div class="summary-card" id="order-summary" style="display:none; background: #e0f2f1; padding: 2rem; border-radius: 20px; margin-bottom: 2rem; border-left: 10px solid var(--primary);">
                    <h3 style="color: var(--primary); font-weight: 800; margin-bottom: 1rem;">Ringkasan Pendaftaran</h3>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Hewan:</span>
                        <strong id="summary-animal">-</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; border-top: 1px dashed #ccc; padding-top: 1rem; margin-top: 1rem;">
                        <span style="font-size: 1.2rem; font-weight: 800;">Total Biaya:</span>
                        <strong id="summary-price" style="font-size: 1.5rem; color: #c62828;">Rp 0</strong>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="btn-submit" style="width: 100%; padding: 1.5rem; font-size: 1.2rem; border-radius: 20px;">
                    <span id="btn-text">KIRIM PENDAFTARAN</span> <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
